---
name: Frontend Lint & Build

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "custom_components/kubernetes/frontend/**"
  pull_request:
    branches-ignore:
      - release-please--branches--main
    paths:
      - "frontend/**"
      - "custom_components/kubernetes/frontend/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.head_ref != 'release-please--branches--main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint with ESLint
        run: npm run lint
        working-directory: frontend

      - name: Check formatting with Prettier
        run: npm run format:check
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Verify bundle exists
        run: test -f custom_components/kubernetes/frontend/kubernetes-panel.js
