---
name: Frontend Lint & Build

on:
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - release-please--branches--main
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded PR runs; never cancel the post-merge run on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Skip the post-merge re-run on main when the commit already arrived via a
  # merged PR (validated there). Direct pushes to main still run.
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          prs=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq 'length')
          if [ "$prs" -gt 0 ]; then
            echo "From a merged PR — already validated; skipping main re-run."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  frontend:
    needs: gate
    runs-on: ubuntu-latest
    if: >-
      needs.gate.outputs.run == 'true' &&
      (github.event_name != 'pull_request' || github.head_ref != 'release-please--branches--main')

    steps:
      - uses: actions/checkout@v7

      - name: Detect frontend changes
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            frontend:
              - "frontend/**"
              - "custom_components/kubernetes/frontend/**"

      - name: Set up Node.js
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.frontend == 'true'
        run: npm ci
        working-directory: frontend

      - name: Lint with ESLint
        if: steps.changes.outputs.frontend == 'true'
        run: npm run lint
        working-directory: frontend

      - name: Check formatting with Prettier
        if: steps.changes.outputs.frontend == 'true'
        run: npm run format:check
        working-directory: frontend

      - name: Build
        if: steps.changes.outputs.frontend == 'true'
        run: npm run build
        working-directory: frontend

      - name: Verify bundle exists
        if: steps.changes.outputs.frontend == 'true'
        run: test -f custom_components/kubernetes/frontend/kubernetes-panel.js

      - name: Verify committed bundle is up to date
        if: steps.changes.outputs.frontend == 'true'
        run: |
          if ! git diff --quiet custom_components/kubernetes/frontend/kubernetes-panel.js; then
            echo "::error::The committed kubernetes-panel.js is out of date. Run 'cd frontend && npm run build' and commit the result."
            git diff --stat custom_components/kubernetes/frontend/kubernetes-panel.js
            exit 1
          fi

      - name: No frontend changes
        if: steps.changes.outputs.frontend != 'true'
        run: echo "No frontend files changed — skipping lint & build."
