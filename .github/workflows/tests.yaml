---
name: Ruff and Pytest

on:
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - release-please--branches--main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.14"

jobs:
  lint:
    name: Lint, Type Check & Security
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.head_ref != 'release-please--branches--main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache virtualenv
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: ~/.local
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install --user -e ".[dev]"

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Type check with mypy
        run: |
          mypy custom_components/

      - name: Security scan with Bandit
        run: |
          bandit -c pyproject.toml -r custom_components/

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.head_ref != 'release-please--branches--main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache virtualenv
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: ~/.local
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install --user -e ".[dev]"

      - name: Test with pytest
        run: |
          pytest

      - name: Upload coverage to Codecov
        if: github.ref != 'refs/heads/release-please--branches--main'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: false
