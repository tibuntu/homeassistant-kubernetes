---
name: Ruff and Pytest

on:
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - release-please--branches--main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

# Cancel superseded PR runs; never cancel the post-merge run on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.14"

jobs:
  # Skip the post-merge re-run on main when the commit already arrived via a
  # merged PR (validated there). Direct pushes to main still run.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          prs=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq 'length')
          if [ "$prs" -gt 0 ]; then
            echo "From a merged PR — already validated; skipping main re-run."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint, Type Check & Security
    needs: gate
    runs-on: ubuntu-latest
    if: >-
      needs.gate.outputs.run == 'true' &&
      (github.event_name != 'pull_request' || github.head_ref != 'release-please--branches--main')

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache virtualenv
        uses: actions/cache@v6
        id: cache-venv
        with:
          path: ~/.local
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install --user -e ".[dev]"

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Type check with mypy
        run: |
          mypy custom_components/

      - name: Security scan with Bandit
        run: |
          bandit -c pyproject.toml -r custom_components/

  test:
    name: Test & Coverage
    needs: gate
    runs-on: ubuntu-latest
    if: >-
      needs.gate.outputs.run == 'true' &&
      (github.event_name != 'pull_request' || github.head_ref != 'release-please--branches--main')

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache virtualenv
        uses: actions/cache@v6
        id: cache-venv
        with:
          path: ~/.local
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install --user -e ".[dev]"

      - name: Test with pytest
        run: |
          pytest

      - name: Upload coverage to Codecov
        if: github.ref != 'refs/heads/release-please--branches--main'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: false
